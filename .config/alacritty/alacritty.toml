[general]
import = [
  "~/.config/alacritty/catppuccin-frappe.toml",
  "~/.config/alacritty/local.toml"
]

[font]
size = 14

[font.bold]
family = "Fira Code"
style = "Medium"

[font.bold_italic]
family = "Fira Code"

[font.italic]
family = "Fira Code"

[font.normal]
family = "Fira Code"
style = "Regular"

[font.offset]
x = 0
y = 1

[selection]
save_to_clipboard = true

[window]
decorations = "none"

[mouse]
bindings = [
  { mouse = "Right", action = "Paste" },
]

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\u001B\r" },
]
